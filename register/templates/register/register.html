<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>회원가입</title>
</head>
<body>
<!-- 색이 있는 배경 박스 -->
<div style="display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: #c2e1e4;">
    <!-- 회원가입 폼이 들어갈 하얀색 카드 박스 -->
    <div style="width: 100%; max-width: 400px; padding: 30px; background-color: white; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.3);">
        <h2 style="text-align: center; margin-bottom: 25px;">회원가입</h2>

        <form method="POST">
            {% csrf_token %}

            <!-- 장고가 주는 입력창들을 하나씩 꺼내서 정렬합니다 -->
            {% for field in form %}
                <div style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 3px; font-size: medium; font-weight: bold;">{{ field.label }}</label>
                    <div>
                        {{ field }}
                    </div>
                    {% if field.errors %}
                        <small style="color: red;">{{ field.errors|striptags }}</small>
                    {% endif %}
                </div>
            {% endfor %}

            <!-- 가입하기 버튼 -->
            <button type="submit" style="width: 100%; margin-top: 20px; padding: 10px; background-color: #466d96; color: white; border: none; border-radius: 5px; cursor: pointer;">
                가입하기
            </button>
        </form>
    </div>
</div>

<!-- 성공 시 팝업 표시 및 URL 정리 -->
<script>
    (function(){
        var success = {{ success|yesno:"true,false" }};
        if (success) {
            alert('입력이 완료되었습니다');
            // 쿼리 파라미터 제거하여 새로고침 시 알림이 다시 뜨지 않게 함
            if (window.history && window.history.replaceState) {
                const url = new URL(window.location.href);
                url.searchParams.delete('success');
                window.history.replaceState({}, document.title, url.pathname + url.search + url.hash);
            }
        }
    })();
</script>

</body>
</html>
